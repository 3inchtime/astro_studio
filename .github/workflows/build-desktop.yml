name: Build Desktop

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build. Leave empty to use the latest v* tag."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-desktop-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$(
              git ls-remote --tags --refs \
                "${{ github.server_url }}/${{ github.repository }}.git" 'v*' \
                | sed 's#.*refs/tags/##' \
                | sort -V \
                | tail -n 1
            )"
          fi

          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain for Windows
        if: ${{ matrix.os == 'windows-latest' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync release version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          npm version "$version" --no-git-tag-version
          RELEASE_VERSION="$version" node -e 'const fs = require("node:fs"); const path = "src-tauri/tauri.conf.json"; const config = JSON.parse(fs.readFileSync(path, "utf8")); config.version = process.env.RELEASE_VERSION; fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);'
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}

      - name: Build desktop bundles
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: astro-studio-[platform]-[arch]-[bundle]

      - name: Build and publish release bundles
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ steps.release-tag.outputs.tag }}
          releaseName: ${{ format('Astro Studio {0}', steps.release-tag.outputs.tag) }}
          releaseBody: See the assets to download and install this version.
          releaseDraft: false
          prerelease: ${{ contains(steps.release-tag.outputs.tag, '-') }}
          generateReleaseNotes: true
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: astro-studio-[platform]-[arch]-[bundle]
          releaseAssetNamePattern: astro-studio_[version]_[platform]_[arch][setup][ext]
